<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">ml-quant-trading social preview</title>
  <desc id="desc">A social preview card for an ML-enhanced multi-factor trading research stack.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#132544"/>
    </linearGradient>
    <pattern id="grid" width="120" height="90" patternUnits="userSpaceOnUse">
      <path d="M120 0H0V90" fill="none" stroke="#1f2d4a" stroke-width="1"/>
    </pattern>
    <pattern id="heat" width="68" height="68" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="24" height="24" rx="5" fill="#1d4ed8"/>
      <rect x="34" y="0" width="24" height="24" rx="5" fill="#0f766e"/>
      <rect x="0" y="34" width="24" height="24" rx="5" fill="#155e75"/>
      <rect x="34" y="34" width="24" height="24" rx="5" fill="#4d7c0f"/>
    </pattern>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="80" y="70" width="1130" height="540" fill="url(#grid)" opacity="0.55"/>
  <text x="88" y="166" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="800">ml-quant-trading</text>
  <text x="92" y="222" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="34">ML-enhanced multi-factor trading research stack</text>
