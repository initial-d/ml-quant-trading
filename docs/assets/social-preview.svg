    <text x="273" y="300">PyTorch tensors</text>
    <rect x="474" y="270" width="192" height="44" rx="22" fill="#13213c" stroke="#334155"/>
    <text x="491" y="300">Bias correction</text>
    <rect x="680" y="270" width="157" height="44" rx="22" fill="#13213c" stroke="#334155"/>
    <text x="698" y="300">Backtesting</text>
    <rect x="850" y="270" width="143" height="44" rx="22" fill="#13213c" stroke="#334155"/>
    <text x="867" y="300">Markowitz</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="26" fill="#e2e8f0">
